<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Authorization callback — alx-post-app</title>
  <style>
    body { max-width: 760px; margin: 3rem auto; padding: 0 1rem;
           font: 16px/1.6 -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
           color: #1a1a1a; }
    h1 { font-size: 1.4rem; }
    code, .box { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .box { display: block; background: #f2f2f2; padding: .8rem; border-radius: 6px;
           word-break: break-all; margin: .6rem 0; }
    button { font: inherit; padding: .5rem 1rem; border: 0; border-radius: 6px;
             background: #0b67d0; color: #fff; cursor: pointer; }
    .muted { color: #666; font-size: .9rem; }
  </style>
</head>
<body>
  <h1>TikTok authorization received</h1>
  <p>Copy the full URL below and paste it into the <code>tiktok_auth.py</code> terminal:</p>
  <span class="box" id="url"></span>
  <button onclick="navigator.clipboard.writeText(document.getElementById('url').textContent)">
    Copy URL
  </button>
  <p class="muted" id="hint"></p>
  <script>
    document.getElementById('url').textContent = window.location.href;
    var p = new URLSearchParams(window.location.search);
    var hint = p.get('code')
      ? 'Detected an authorization code — you can also copy just it: ' + p.get('code')
      : (p.get('error') ? 'Authorization error: ' + p.get('error') : 'No code found in URL.');
    document.getElementById('hint').textContent = hint;
  </script>
</body>
</html>
